name: CI with Dynamic SQL Whitelisting

on:
  push:
    branches: [ "branch01" ]
  pull_request:
    branches: [ "branch01" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install ODBC Driver 18 for SQL Server
      - name: Install ODBC Driver
        run: |
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      # Log in to Azure using service principal credentials stored in GitHub Secrets
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      # Detect runner IP and whitelist it
      - name: Whitelist runner IP
        run: |
          agentIP=$(curl -s https://api.ipify.org)
          echo "Runner IP is $agentIP"
          az sql server firewall-rule create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.AZURE_SQL_SERVER }} \
            --name GitHubRunnerDynamic \
            --start-ip-address $agentIP \
            --end-ip-address $agentIP

      # Run pytest and generate reports
      - name: Run tests
        run: pytest -v --junitxml=pytest-report.xml --html=pytest-report.html --self-contained-html

      # Upload reports as artifacts
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            pytest-report.xml
            pytest-report.html

      # Remove firewall rule after job finishes (always runs, even if tests fail)
      - name: Remove firewall rule
        if: always()
        run: |
          az sql server firewall-rule delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.AZURE_SQL_SERVER }} \
            --name GitHubRunnerDynamic
