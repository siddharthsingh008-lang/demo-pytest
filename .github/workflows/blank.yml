name: Run Data Validation Tests

on:
  push:
    branches: [ "branch01" ]
  pull_request:
    branches: [ "branch01" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run pytest
        run: pytest -v
